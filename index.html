    <!-- JSON-LD Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do you work on systems installed by other companies?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely! Most of our repairs are on systems we didn't install. We work on all brands and systems regardless of who originally installed them. Many solar companies go out of business or stop providing service - we're here to fill that gap and keep your system running."
          }
        },
        {
          "@type": "Question",
          "name": "How do I know if my solar system isn't working?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Signs your system needs attention: higher electric bills than expected, monitoring app showing zero or low production, error messages on your inverter, physical damage to panels, or your system hasn't been cleaned in over a year. If you're unsure, our $400 site visit and diagnostic will tell you exactly what's happening."
          }
        },
        {
          "@type": "Question",
          "name": "What is RMA warranty claim processing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "RMA (Return Merchandise Authorization) is the process of getting faulty equipment replaced under manufacturer warranty. We handle all the paperwork, documentation, and communication with manufacturers like SolarEdge, Enphase, Tesla, and others. If your inverter or panels are under warranty, we process the claim at no additional cost - you only pay for our diagnostic and installation labor."
          }
        },
        {
          "@type": "Question",
          "name": "What brands do you repair?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We repair all major solar brands including SolarEdge, Enphase, SMA, Fronius, Tesla, SunPower, LG, Panasonic, Canadian Solar, Q Cells, and many more. Our technicians are trained on multiple platforms and carry common replacement parts for faster repairs."
          }
        },
        {
          "@type": "Question",
          "name": "Will repairs void my warranty?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. We use manufacturer-approved parts and follow proper procedures to maintain your existing warranties. In many cases, we can work directly with manufacturers for warranty claims, potentially saving you money on covered repairs."
          }
        },
        {
          "@type": "Question",
          "name": "How quickly can you fix my system?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer same-week diagnostic appointments. Many common repairs like inverter replacements can be completed same-day or next-day if we have parts in stock. For specialty parts, we typically get them within 3-5 business days. Emergency service is available for critical issues."
          }
        },
        {
          "@type": "Question",
          "name": "Why did my solar system stop working?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Common causes include inverter failure (most common), panel damage from weather, loose electrical connections, monitoring system issues, or shading from new tree growth. Our diagnostic service identifies the exact cause and provides a clear repair plan with upfront pricing."
          }
        }
      ]
    }
    </script>
